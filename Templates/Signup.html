<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Signup</h1>

<form method="POST" action="/completesignup">
    <label for="username">Username:</label>
    <input type="text" name="username" id="username" placeholder="Enter a username" required>
    <br>

    <label for="password">Password:</label>
    <input type="password" name="password" id="password" placeholder="Enter a password" required>
    <br>

    <label for="accesskey">     Key:</label>
    <input type="accesskey" name="accesskey" id="accesskey" placeholder="Enter the key" required>
    <button type="submit">Signup</button>

    
    <br>
    <p>Already have an account? <a href="/login">Login here</a>.</p>
</form>

</body>
